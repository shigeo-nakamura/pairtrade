dex_name: lighter
rest_endpoint: https://mainnet.zklighter.elliot.ai/
web_socket_endpoint: wss://mainnet.zklighter.elliot.ai/stream
dry_run: false
agent_name: debot-pair-btceth-b

# Fixed pair: BTC/ETH only
universe_pairs:
- BTC/ETH
max_active_pairs: 1

# Timing
interval_secs: 5
trading_period_secs: 60

# Pair diagnostics (simplified: relaxed thresholds)
pair_selection_lookback_hours_short: 1
pair_selection_lookback_hours_long: 2
adf_p_threshold: 0.15
half_life_max_hours: 2.0
metrics_window_length: 240
warm_start_mode: relaxed
warm_start_min_bars: 60

# Core MR params (optimized 2026-04-02: exit_z 0.5->0.3, sl_z 4.0->6.0, +$26.74/7d in 16-grid BT)
entry_z_score_base: 1.5
entry_z_score_min: 1.0
entry_z_score_max: 2.0
# A/B test: exit_z=0.2 (early take profit)
exit_z_score: 0.2
stop_loss_z_score: 6.0
force_close_time_secs: 3600

# Risk
risk_pct_per_trade: 0.40
equity_usd_fallback: 1000
max_leverage: 1
max_loss_r_mult: 3.0
max_dd_pct: 0.10                      # Max drawdown tolerance for auto-sizing

# Execution
cooldown_secs: 60
slippage_bps: 0
fee_bps: 0
entry_post_only_timeout_secs: 30

# Filters (relaxed: let z-score do the work)
spread_velocity_max_sigma_per_min: 0.15
spread_trend_max_slope_sigma: 1.0
beta_divergence_max: 0.30
beta_min: 0.30
hedge_ratio_max_deviation: 0.20
entry_vol_lookback_hours: 2
vol_spike_mult: 3.0
net_funding_min_per_hour: -0.01
reeval_jump_z_mult: 1.5

# Phase 2 filters (BT 2026-04-05: beta_gap=3.0 best, +$0.84 vs baseline +$0.20)
entry_velocity_block_sigma_per_min: 0.0
funding_entry_z_scale: 0.0
beta_gap_entry_z_scale: 3.0

# Circuit breaker
circuit_breaker_tier1_losses: 5
circuit_breaker_tier1_cooldown_secs: 600
circuit_breaker_tier2_losses: 8
circuit_breaker_tier2_cooldown_secs: 3600
